# Project Chimera — continuous integration
# Runs Checkstyle (make lint) then unit tests (make test) on Java 21 via Maven Wrapper.

name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Lint (Checkstyle)
        run: make lint

      - name: Test (JUnit 5 / Surefire)
        run: make test
