name: Project Chimera CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Setup dependencies
        run: make setup

      - name: Run tests (expect failures — TDD)
        run: make test
        continue-on-error: true

      - name: Run lint
        run: make lint
        continue-on-error: true

      - name: Spec check
        run: make spec-check
